<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>QuartierPlus</title>
    <style id="expo-reset">
      html, body { height: 100%; margin: 0; }
      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
      #splash {
        position: fixed; inset: 0; background: #2E7D32;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.5s;
      }
      #splash-title { color: #fff; font-family: sans-serif; font-size: 32px; font-weight: bold; margin: 0 0 8px; }
      #splash-sub   { color: rgba(255,255,255,0.8); font-family: sans-serif; font-size: 15px; margin: 0; }
      #splash.hidden { opacity: 0; pointer-events: none; }
      .loader {
        width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3);
        border-top-color: #fff; border-radius: 50%;
        animation: spin 0.8s linear infinite; margin-top: 24px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <link rel="icon" href="/favicon.ico" />
  </head>
  <body>
    <div id="splash">
      <div id="splash-title">QuartierPlus</div>
      <div id="splash-sub">Chargement de l'application...</div>
      <div class="loader"></div>
    </div>
    <noscript>Activez JavaScript pour utiliser QuartierPlus.</noscript>
    <div id="root"></div>
    <script>
      window.onerror = function(msg) {
        var sp = document.getElementById('splash');
        if (sp) {
          sp.style.background = '#B71C1C';
          sp.innerHTML = '<div id="splash-title" style="color:#fff;font-family:sans-serif;">Erreur</div><p style="color:rgba(255,255,255,0.85);font-family:monospace;padding:0 24px;text-align:center;font-size:12px">' + msg + '</p>';
        }
      };
      document.addEventListener('DOMContentLoaded', function() {
        var root = document.getElementById('root');
        if (!root) return;
        var observer = new MutationObserver(function() {
          if (root.children.length > 0) {
            var sp = document.getElementById('splash');
            if (sp) sp.classList.add('hidden');
            setTimeout(function() { if (sp && sp.parentNode) sp.parentNode.removeChild(sp); }, 600);
            observer.disconnect();
          }
        });
        observer.observe(root, { childList: true, subtree: true });
      });
    </script>
    <script src="/_expo/static/js/web/__expo-metro-runtime-0c48b0beee2d3ce6030b475fcc5b1846.js" defer></script>
    <script src="/_expo/static/js/web/__common-6c41e2971549a7ea5e32722ff82a1308.js" defer></script>
    <script src="/_expo/static/js/web/AppEntry-24bd183bad755e635aa989afb8d88292.js" defer></script>
  </body>
</html>
